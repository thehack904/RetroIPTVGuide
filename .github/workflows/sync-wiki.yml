name: 📚 Sync RetroIPTVGuide Wiki

on:
  push:
    branches: [ main ]
    paths:
      - "docs/wiki/**"
      - ".github/workflows/sync-wiki.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-wiki:
    name: 📚 Sync docs/wiki to GitHub Wiki
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      - name: 🔍 Verify wiki source files
        run: |
          echo "Repository root:"
          pwd
          echo ""
          echo "docs/wiki contents:"
          ls -lah docs/wiki

      - name: 🔧 Configure git
        run: |
          git config --global user.name "RetroIPTVGuide Wiki Sync"
          git config --global user.email "actions@users.noreply.github.com"

      - name: 📥 Clone GitHub Wiki
        env:
          GH_TOKEN: ${{ secrets.GHCR_PAT }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki

      - name: 🔍 Verify cloned wiki repo
        run: |
          echo "Wiki repo contents:"
          ls -lah wiki
          cd wiki
          echo ""
          echo "Current branch:"
          git branch --show-current

      - name: 🔁 Sync docs/wiki to Wiki repo
        run: |
          rsync -av --delete docs/wiki/ wiki/

          echo ""
          echo "Wiki repo after sync:"
          ls -lah wiki

          cd wiki

          echo ""
          echo "Git status:"
          git status --short

          if [ -z "$(git status --short)" ]; then
            echo "No wiki changes to commit."
            exit 0
          fi

          git add .
          git commit -m "Sync wiki from docs/wiki"
          git push origin HEAD:main
