name: 📚 Sync RetroIPTVGuide Wiki

on:
  push:
    branches: [ main ]
    paths:
      - "docs/wiki/**"
      - ".github/workflows/sync-wiki.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-wiki:
    name: 📚 Sync docs/wiki to GitHub Wiki
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 🔍 Verify wiki source files
        run: |
          echo "Repository root:"
          pwd
          echo ""
          echo "docs/wiki contents:"
          ls -lah docs/wiki

          if [ ! -f docs/wiki/Home.md ]; then
            echo "ERROR: docs/wiki/Home.md is required for the GitHub Wiki landing page."
            exit 1
          fi

      - name: 🔧 Configure git
        run: |
          git config --global user.name "RetroIPTVGuide Wiki Sync"
          git config --global user.email "actions@users.noreply.github.com"

      - name: 📥 Clone GitHub Wiki
        env:
          GH_TOKEN: ${{ secrets.GHCR_PAT }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki

      - name: 🔁 Sync docs/wiki to GitHub Wiki
        env:
          GH_TOKEN: ${{ secrets.GHCR_PAT }}
        run: |
          rsync -av --delete --exclude='.git/' docs/wiki/ wiki/

          cd wiki

          echo ""
          echo "Current wiki branch:"
          git branch --show-current

          echo ""
          echo "Git status:"
          git status --short

          if [ -z "$(git status --short)" ]; then
            echo "No wiki changes to commit."
            exit 0
          fi

          git add .
          git commit -m "Sync wiki from docs/wiki"

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          git push origin HEAD:main
