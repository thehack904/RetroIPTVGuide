<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroIPTV Traffic</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #0a1a6e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Outer frame ──────────────────────────────────────────────── */
    .tf-frame {
      width: min(1280px, 100vw);
      aspect-ratio: 16 / 9;
      background: linear-gradient(160deg, #0f2ab0 0%, #0a1a80 40%, #081060 100%);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* subtle scanline vignette */
    .tf-frame::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 3px,
          rgba(0,0,0,0.06) 3px,
          rgba(0,0,0,0.06) 4px
        );
      pointer-events: none;
      z-index: 1000;
    }

    /* ── Header bar ───────────────────────────────────────────────── */
    .tf-header {
      background: linear-gradient(90deg, #0d2aaa 0%, #1640d4 50%, #0d2aaa 100%);
      border-bottom: 3px solid #4a70ff;
      padding: 0.4em 1.2em;
      display: flex;
      align-items: center;
      gap: 0.6em;
      flex-shrink: 0;
      position: relative;
      z-index: 1001;
    }

    .tf-header-title {
      font-size: clamp(20px, 3.2vw, 42px);
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.3em;
    }

    .tf-demo-badge {
      font-size: clamp(9px, 1.2vw, 14px);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: #ffd700;
      color: #0a0e2a;
      padding: 0.15em 0.5em;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .tf-city-label {
      font-size: clamp(14px, 2.2vw, 30px);
      font-weight: 900;
      letter-spacing: 0.05em;
      color: #ffd700;
      margin-left: auto;
      text-align: right;
    }

    .tf-updated-time {
      font-size: clamp(9px, 1.1vw, 14px);
      font-weight: 700;
      color: #c8d8ff;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Main content area ────────────────────────────────────────── */
    .tf-body {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 2.5fr;
      gap: 0.5em;
      padding: 0.4em 0.7em 0.3em;
      min-height: 0;
    }

    /* ── Left panel ───────────────────────────────────────────────── */
    .tf-left {
      display: flex;
      flex-direction: column;
      gap: 0.35em;
      min-height: 0;
    }

    /* ── Section box ──────────────────────────────────────────────── */
    .tf-box {
      background: rgba(10, 40, 170, 0.75);
      border: 2px solid #3058d8;
      border-radius: 4px;
      padding: 0.4em 0.6em;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 2px 8px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
    }

    .tf-box-title {
      font-size: clamp(9px, 1.2vw, 15px);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffd700;
      border-bottom: 1px solid #3058d8;
      padding-bottom: 0.25em;
      margin-bottom: 0.3em;
      flex-shrink: 0;
    }

    /* ── Congestion summary ───────────────────────────────────────── */
    .tf-congestion-level {
      font-size: clamp(18px, 2.8vw, 38px);
      font-weight: 900;
      text-align: center;
      margin: 0.1em 0;
      line-height: 1.1;
    }
    .tf-congestion-level[data-level="Light"]    { color: #22cc44; }
    .tf-congestion-level[data-level="Moderate"] { color: #ffaa00; }
    .tf-congestion-level[data-level="Heavy"]    { color: #ee2222; }

    .tf-congestion-sub {
      font-size: clamp(8px, 1vw, 12px);
      color: #c8d8ff;
      text-align: center;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.3em;
    }

    /* tri-color congestion bar */
    .tf-cong-bar {
      display: flex;
      height: clamp(8px, 1.2vw, 14px);
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid #3058d8;
      margin-bottom: 0.25em;
    }
    .tf-cong-bar-seg { height: 100%; transition: width 0.6s ease; }

    /* percent rows */
    .tf-pct-row {
      display: flex;
      align-items: center;
      gap: 0.3em;
      margin-bottom: 0.15em;
    }
    .tf-pct-dot  { width: 0.55em; height: 0.55em; border-radius: 50%; flex-shrink: 0; }
    .tf-pct-label { font-size: clamp(8px, 1vw, 12px); color: #c8d8ff; flex: 1; }
    .tf-pct-num   { font-size: clamp(8px, 1vw, 12px); font-weight: 700; color: #ffd700; }

    /* ── Incident count badge ─────────────────────────────────────── */
    .tf-incident-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4em;
      padding: 0.3em 0;
    }

    .tf-incident-count {
      font-size: clamp(28px, 4.5vw, 60px);
      font-weight: 900;
      line-height: 1;
      color: #fff;
    }

    .tf-incident-label {
      font-size: clamp(10px, 1.3vw, 16px);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #c8d8ff;
      line-height: 1.2;
    }

    /* ── Incident list ────────────────────────────────────────────── */
    .tf-incidents-box {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .tf-incident-list {
      display: flex;
      flex-direction: column;
      gap: 0.2em;
      overflow: hidden;
    }

    .tf-incident-item {
      display: flex;
      align-items: flex-start;
      gap: 0.35em;
      padding: 0.2em 0.3em;
      border-radius: 3px;
      background: rgba(0,10,60,0.4);
      border-left: 3px solid transparent;
    }
    .tf-incident-item[data-sev="red"]    { border-left-color: #ee2222; }
    .tf-incident-item[data-sev="yellow"] { border-left-color: #ffaa00; }
    .tf-incident-item[data-sev="green"]  { border-left-color: #22cc44; }

    .tf-incident-icon {
      font-size: clamp(10px, 1.3vw, 16px);
      flex-shrink: 0;
      line-height: 1.3;
    }

    .tf-incident-text { min-width: 0; }

    .tf-incident-title {
      font-size: clamp(8px, 1.1vw, 13px);
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tf-incident-road {
      font-size: clamp(7px, 0.95vw, 11px);
      color: #c8d8ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Map container (right panel) ──────────────────────────────── */
    .tf-map-box {
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: rgba(10, 40, 170, 0.75);
      border: 2px solid #3058d8;
      border-radius: 4px;
    }

    .tf-map-box-title {
      font-size: clamp(9px, 1.2vw, 15px);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffd700;
      border-bottom: 1px solid #3058d8;
      padding: 0.4em 0.6em 0.25em;
      background: rgba(10,40,170,0.85);
      flex-shrink: 0;
      position: relative;
      z-index: 2;
    }

    /* Canvas fills remaining map area */
    #tf-map-canvas {
      flex: 1;
      display: block;
      width: 100%;
      min-height: 0;
    }

    /* ── Ticker bar ───────────────────────────────────────────────── */
    .tf-ticker-bar {
      background: #0a0e2a;
      border-top: 2px solid #4a70ff;
      display: flex;
      align-items: center;
      overflow: hidden;
      flex-shrink: 0;
      height: clamp(24px, 3.6vw, 42px);
      position: relative;
      z-index: 1001;
    }

    .tf-ticker-label {
      background: #ffd700;
      color: #0a0e2a;
      font-size: clamp(9px, 1.3vw, 16px);
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0 0.7em;
      white-space: nowrap;
      height: 100%;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .tf-ticker-scroll {
      overflow: hidden;
      flex: 1;
      height: 100%;
      display: flex;
      align-items: center;
    }

    .tf-ticker-track {
      display: inline-block;
      white-space: nowrap;
      font-size: clamp(9px, 1.2vw, 14px);
      font-weight: 700;
      color: #ffd700;
      animation: tf-scroll 40s linear infinite;
      padding-left: 100%;
    }

    @keyframes tf-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-100%); }
    }

    /* ── Loading / error ──────────────────────────────────────────── */
    .tf-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      font-size: clamp(14px, 2vw, 24px);
      color: #90a8f0;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
<div class="tf-frame" id="tfFrame">
  <div class="tf-loading" id="tfLoading">Loading traffic data&hellip;</div>
</div>

<script>
(function () {
  'use strict';

  var FALLBACK_REFRESH_MS = 2 * 60 * 1000;
  var ERROR_RETRY_MS      = 60 * 1000;

  // ── Seeded PRNG (mulberry32) ─────────────────────────────────────────────
  function mulberry32(seed) {
    return function () {
      seed |= 0;
      seed = (seed + 0x6D2B79F5) | 0;
      var t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function makeSeed(cityId, timeSlot) {
    var str = String(cityId) + ':' + String(timeSlot);
    var h = 2166136261;
    for (var i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619) >>> 0;
    }
    return h;
  }

  // ── Per-city highway data ────────────────────────────────────────────────
  // Each entry: layout template name + up to 5 highway labels.
  // Layout templates define road geometry as fractions of canvas W/H.
  var CITY_DATA = {
    'New York City': { layout: 'grid',     hwy: ['I-95',  'I-278',  'I-495',  'I-87',    'FDR Dr']     },
    'Los Angeles':   { layout: 'sprawl',   hwy: ['I-5',   'I-10',   'I-405',  'US-101',  'SR-110']     },
    'Chicago':       { layout: 'hub',      hwy: ['I-90',  'I-94',   'I-290',  'I-55',    'Lake Shore'] },
    'Houston':       { layout: 'ring',     hwy: ['I-10',  'I-45',   'I-610',  'US-59',   'Beltway 8']  },
    'Phoenix':       { layout: 'sprawl',   hwy: ['I-10',  'I-17',   'SR-51',  'SR-101',  'US-60']      },
    'Philadelphia':  { layout: 'diagonal', hwy: ['I-95',  'I-76',   'I-676',  'US-1',    'PA-309']     },
    'San Antonio':   { layout: 'ring',     hwy: ['I-10',  'I-35',   'I-37',   'US-281',  'Loop 410']   },
    'San Diego':     { layout: 'coastal',  hwy: ['I-5',   'I-8',    'I-15',   'SR-94',   'SR-163']     },
    'Dallas':        { layout: 'grid',     hwy: ['I-30',  'I-35E',  'I-635',  'US-75',   'SR-114']     },
    'San Jose':      { layout: 'coastal',  hwy: ['I-280', 'I-880',  'SR-87',  'SR-101',  'US-101']     },
  };

  // Layout templates: return array of road segment objects.
  // x1,y1,x2,y2 are fractions of canvas W and H.  w = stroke width in px.
  var LAYOUTS = {
    'grid': function(W, H, names) {
      return [
        {x1:0,      y1:H*0.36, x2:W,      y2:H*0.40, w:7, label:names[0]}, // E-W interstate
        {x1:0,      y1:H*0.65, x2:W,      y2:H*0.62, w:7, label:names[1]}, // E-W interstate 2
        {x1:W*0.30, y1:0,      x2:W*0.28, y2:H,      w:7, label:names[2]}, // N-S interstate
        {x1:W*0.72, y1:0,      x2:W*0.70, y2:H,      w:7, label:names[3]}, // N-S interstate 2
        {x1:0,      y1:H,      x2:W*0.48, y2:0,      w:5, label:names[4]}, // diagonal bypass
      ];
    },
    'sprawl': function(W, H, names) {
      return [
        {x1:W*0.18, y1:0,      x2:W*0.20, y2:H,      w:7, label:names[0]}, // N-S
        {x1:0,      y1:H*0.50, x2:W,      y2:H*0.52, w:7, label:names[1]}, // E-W
        {x1:W*0.55, y1:0,      x2:W*0.45, y2:H,      w:7, label:names[2]}, // diagonal
        {x1:0,      y1:H*0.26, x2:W*0.62, y2:H*0.56, w:5, label:names[3]}, // diagonal 2
        {x1:W*0.38, y1:H,      x2:W*0.54, y2:0,      w:5, label:names[4]}, // diagonal 3
      ];
    },
    'hub': function(W, H, names) {
      return [
        {x1:0,      y1:H*0.32, x2:W*0.42, y2:H*0.60, w:7, label:names[0]}, // diagonal
        {x1:W*0.38, y1:0,      x2:W*0.40, y2:H,      w:7, label:names[1]}, // N-S
        {x1:0,      y1:H*0.56, x2:W,      y2:H*0.54, w:7, label:names[2]}, // E-W
        {x1:W*0.60, y1:0,      x2:W*0.62, y2:H,      w:6, label:names[3]}, // N-S 2
        {x1:W*0.82, y1:0,      x2:W*0.84, y2:H,      w:4, label:names[4]}, // edge road
      ];
    },
    'ring': function(W, H, names) {
      return [
        {x1:0,      y1:H*0.52, x2:W,      y2:H*0.49, w:7, label:names[0]}, // E-W
        {x1:W*0.38, y1:0,      x2:W*0.40, y2:H,      w:7, label:names[1]}, // N-S
        {x1:0,      y1:H*0.28, x2:W*0.38, y2:H*0.72, w:5, label:names[2]}, // arc W
        {x1:W*0.62, y1:H*0.72, x2:W,      y2:H*0.28, w:5, label:names[3]}, // arc E
        {x1:0,      y1:H*0.72, x2:W*0.40, y2:H,      w:4, label:names[4]}, // spoke
      ];
    },
    'diagonal': function(W, H, names) {
      return [
        {x1:0,      y1:H*0.22, x2:W,      y2:H*0.58, w:7, label:names[0]}, // diagonal
        {x1:0,      y1:H*0.62, x2:W,      y2:H*0.60, w:7, label:names[1]}, // E-W
        {x1:W*0.22, y1:H*0.70, x2:W,      y2:H*0.70, w:5, label:names[2]}, // E-W lower
        {x1:W*0.42, y1:0,      x2:W*0.44, y2:H,      w:6, label:names[3]}, // N-S
        {x1:0,      y1:H,      x2:W*0.32, y2:H*0.18, w:5, label:names[4]}, // diagonal 2
      ];
    },
    'coastal': function(W, H, names) {
      return [
        {x1:W*0.22, y1:0,      x2:W*0.20, y2:H,      w:7, label:names[0]}, // N-S coastal
        {x1:0,      y1:H*0.50, x2:W,      y2:H*0.52, w:7, label:names[1]}, // E-W
        {x1:W*0.66, y1:0,      x2:W*0.68, y2:H,      w:7, label:names[2]}, // N-S inland
        {x1:0,      y1:H*0.28, x2:W*0.72, y2:H*0.66, w:5, label:names[3]}, // diagonal
        {x1:W*0.10, y1:0,      x2:W*0.10, y2:H,      w:4, label:names[4]}, // edge road
      ];
    },
  };

  // Fallback layout for unknown cities
  LAYOUTS['default'] = LAYOUTS['grid'];

  function getCityRoads(city, W, H) {
    var cd  = CITY_DATA[city.name] || {};
    var tmpl = LAYOUTS[cd.layout] || LAYOUTS['default'];
    var names = cd.hwy || ['I-10', 'I-20', 'I-40', 'US-1', 'State Hwy'];
    return tmpl(W, H, names);
  }

  // ── Canvas map drawing ───────────────────────────────────────────────────
  function drawCityMap(canvas, city, greenPct, yellowPct, redPct, seed) {
    var W = canvas.width;
    var H = canvas.height;
    if (W < 4 || H < 4) return;

    var ctx = canvas.getContext('2d');

    // ── Background: readable dark-navy base ─────────────────────────
    ctx.fillStyle = '#152648';
    ctx.fillRect(0, 0, W, H);

    // ── City block grid ─────────────────────────────────────────────
    var BLOCK = Math.max(14, Math.round(W / 24));

    // Block interiors — slightly lighter squares
    ctx.fillStyle = '#1b3060';
    var c, r;
    for (c = -1; c * BLOCK < W + BLOCK; c++) {
      for (r = -1; r * BLOCK < H + BLOCK; r++) {
        ctx.fillRect(c * BLOCK + 2, r * BLOCK + 2, BLOCK - 3, BLOCK - 3);
      }
    }

    // Minor streets (thin grid)
    ctx.strokeStyle = '#1e3570';
    ctx.lineWidth = 0.5;
    for (c = 0; c * BLOCK <= W + BLOCK; c++) {
      ctx.beginPath(); ctx.moveTo(c * BLOCK, 0); ctx.lineTo(c * BLOCK, H); ctx.stroke();
    }
    for (r = 0; r * BLOCK <= H + BLOCK; r++) {
      ctx.beginPath(); ctx.moveTo(0, r * BLOCK); ctx.lineTo(W, r * BLOCK); ctx.stroke();
    }

    // Collector roads (every 3 blocks)
    ctx.strokeStyle = '#2a4580';
    ctx.lineWidth = 1;
    for (c = 0; c * BLOCK * 3 <= W + BLOCK; c++) {
      ctx.beginPath(); ctx.moveTo(c * BLOCK * 3, 0); ctx.lineTo(c * BLOCK * 3, H); ctx.stroke();
    }
    for (r = 0; r * BLOCK * 3 <= H + BLOCK; r++) {
      ctx.beginPath(); ctx.moveTo(0, r * BLOCK * 3); ctx.lineTo(W, r * BLOCK * 3); ctx.stroke();
    }

    // Arterial roads (every 6 blocks) — clearly visible
    ctx.strokeStyle = '#3a58a0';
    ctx.lineWidth = 2;
    for (c = 0; c * BLOCK * 6 <= W + BLOCK; c++) {
      ctx.beginPath(); ctx.moveTo(c * BLOCK * 6, 0); ctx.lineTo(c * BLOCK * 6, H); ctx.stroke();
    }
    for (r = 0; r * BLOCK * 6 <= H + BLOCK; r++) {
      ctx.beginPath(); ctx.moveTo(0, r * BLOCK * 6); ctx.lineTo(W, r * BLOCK * 6); ctx.stroke();
    }

    // ── Build traffic colour pool ────────────────────────────────────
    var pool = [], i;
    for (i = 0; i < greenPct;  i++) pool.push('#22ee55');
    for (i = 0; i < yellowPct; i++) pool.push('#ffcc00');
    for (i = 0; i < redPct;    i++) pool.push('#ff3322');
    if (!pool.length) pool.push('#22ee55');

    var rng = mulberry32(seed);

    // ── Highway corridors: base stroke then traffic-colour segments ──
    var roads = getCityRoads(city, W, H);
    ctx.lineCap = 'round';

    roads.forEach(function (rd) {
      var dx = rd.x2 - rd.x1, dy = rd.y2 - rd.y1;

      // Base highway road (steel blue)
      ctx.strokeStyle = '#4878c8';
      ctx.lineWidth = (rd.w || 6) + 2;
      ctx.beginPath();
      ctx.moveTo(rd.x1, rd.y1);
      ctx.lineTo(rd.x2, rd.y2);
      ctx.stroke();

      // Traffic-colour segments
      var SEGS = 3 + Math.floor(rng() * 4);
      ctx.lineWidth = rd.w || 6;
      for (var s = 0; s < SEGS; s++) {
        var t0 = s / SEGS, t1 = (s + 1) / SEGS;
        ctx.strokeStyle = pool[Math.floor(rng() * pool.length)];
        ctx.beginPath();
        ctx.moveTo(rd.x1 + dx * t0, rd.y1 + dy * t0);
        ctx.lineTo(rd.x1 + dx * t1, rd.y1 + dy * t1);
        ctx.stroke();
      }

      // Road label badge
      if (rd.label) {
        var mx = (rd.x1 + rd.x2) / 2;
        var my = (rd.y1 + rd.y2) / 2;
        var fs = Math.max(9, Math.round(W * 0.016));
        ctx.font = 'bold ' + fs + 'px Arial';
        var tw = ctx.measureText(rd.label).width;
        ctx.fillStyle = 'rgba(8,18,50,0.85)';
        roundRect(ctx, mx - tw / 2 - 4, my - fs - 1, tw + 8, fs + 6, 3);
        ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.fillText(rd.label, mx, my + 2);
      }
    });

    // ── Arterial traffic overlay ─────────────────────────────────────
    var artRng = mulberry32(seed + 97);
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';

    for (r = 0; r * BLOCK * 6 <= H + BLOCK; r++) {
      var ay = r * BLOCK * 6;
      var ASEGS = 4;
      for (var s2 = 0; s2 < ASEGS; s2++) {
        var ax0 = s2 * W / ASEGS, ax1 = (s2 + 1) * W / ASEGS;
        ctx.strokeStyle = pool[Math.floor(artRng() * pool.length)];
        ctx.beginPath(); ctx.moveTo(ax0, ay); ctx.lineTo(ax1, ay); ctx.stroke();
      }
    }
    for (c = 0; c * BLOCK * 6 <= W + BLOCK; c++) {
      var ax = c * BLOCK * 6;
      var ASEGS2 = 3;
      for (var s3 = 0; s3 < ASEGS2; s3++) {
        var ay0 = s3 * H / ASEGS2, ay1 = (s3 + 1) * H / ASEGS2;
        ctx.strokeStyle = pool[Math.floor(artRng() * pool.length)];
        ctx.beginPath(); ctx.moveTo(ax, ay0); ctx.lineTo(ax, ay1); ctx.stroke();
      }
    }

    // ── City name watermark ──────────────────────────────────────────
    var wmSz = Math.max(16, Math.round(W * 0.038));
    ctx.textAlign = 'center';
    ctx.font = 'bold ' + wmSz + 'px Arial';
    ctx.fillStyle = 'rgba(140,190,255,0.14)';
    ctx.fillText((city.name || 'CITY').toUpperCase(), W / 2, H * 0.52);
    ctx.font = Math.round(wmSz * 0.6) + 'px Arial';
    ctx.fillStyle = 'rgba(140,190,255,0.10)';
    ctx.fillText(city.state || '', W / 2, H * 0.52 + wmSz * 1.1);
  }

  // Polyfill helper: rounded rect path (Canvas API lacks this in older browsers)
  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // ── DOM helpers ──────────────────────────────────────────────────────────
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function buildIncidentItem(inc) {
    return '<div class="tf-incident-item" data-sev="' + esc(inc.severity) + '">' +
      '<div class="tf-incident-icon">' + (inc.icon || '⚠') + '</div>' +
      '<div class="tf-incident-text">' +
        '<div class="tf-incident-title">' + esc(inc.title) + '</div>' +
        '<div class="tf-incident-road">' + esc(inc.road) + ' ' + esc(inc.direction) + '</div>' +
      '</div>' +
    '</div>';
  }

  // ── Main build / update ──────────────────────────────────────────────────
  var _lastCityId   = null;
  var _lastTimeSlot = null;

  function build(data) {
    var frame     = document.getElementById('tfFrame');
    var city      = data.city    || {};
    var summary   = data.summary || {};
    var incidents = Array.isArray(data.incidents) ? data.incidents : [];
    var level     = summary.congestion_level || 'Light';
    var cityId    = city.id;
    var timeSlot  = data.time_slot || 0;
    var cityName  = city.name ? (esc(city.name) + ', ' + esc(city.state)) : 'Traffic';
    var updatedTime = data.updated
      ? new Date(data.updated).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}) : '';

    var greenPct  = summary.green_percent  || 0;
    var yellowPct = summary.yellow_percent || 0;
    var redPct    = summary.red_percent    || 0;
    var incCount  = summary.incident_count != null ? summary.incident_count : incidents.length;

    var incidentItems = incidents.map(buildIncidentItem).join('');

    var tickParts = [
      cityName + ' \u2014 ' + esc(level) + ' congestion',
      incCount + ' reported incident' + (incCount !== 1 ? 's' : ''),
      greenPct + '% free flow \u00b7 ' + yellowPct + '% slow \u00b7 ' + redPct + '% heavy',
    ];
    incidents.forEach(function (inc) {
      tickParts.push((inc.icon || '') + ' ' + inc.title + ' on ' + inc.road + ' ' + inc.direction);
    });
    var tickText = tickParts.join(' \u2022 ') + ' \u2022 ';

    // ── Full rebuild on first render or city change ──────────────────
    if (_lastCityId !== cityId) {
      frame.innerHTML =
        '<div class="tf-header">' +
          '<div class="tf-header-title">&#128663;&nbsp;RetroIPTV Traffic</div>' +
          '<div class="tf-demo-badge">(Simulated)</div>' +
          '<div class="tf-city-label" id="tf-city-label">' + cityName + '</div>' +
          '<div class="tf-updated-time" id="tf-updated-time">' + updatedTime + '</div>' +
        '</div>' +
        '<div class="tf-body">' +
          '<div class="tf-left">' +
            '<div class="tf-box">' +
              '<div class="tf-box-title">Congestion</div>' +
              '<div class="tf-congestion-level" id="tf-cong-level" data-level="' + esc(level) + '">' + esc(level) + '</div>' +
              '<div class="tf-congestion-sub">Traffic Level</div>' +
              '<div class="tf-cong-bar" id="tf-cong-bar">' +
                '<div class="tf-cong-bar-seg" id="tf-bar-green"  style="width:' + greenPct  + '%;background:#22cc44"></div>' +
                '<div class="tf-cong-bar-seg" id="tf-bar-yellow" style="width:' + yellowPct + '%;background:#ffaa00"></div>' +
                '<div class="tf-cong-bar-seg" id="tf-bar-red"    style="width:' + redPct    + '%;background:#ee2222"></div>' +
              '</div>' +
              '<div class="tf-pct-row"><div class="tf-pct-dot" style="background:#22cc44"></div><div class="tf-pct-label">Free Flow</div><div class="tf-pct-num" id="tf-pct-green">' + greenPct  + '%</div></div>' +
              '<div class="tf-pct-row"><div class="tf-pct-dot" style="background:#ffaa00"></div><div class="tf-pct-label">Slow</div><div class="tf-pct-num" id="tf-pct-yellow">' + yellowPct + '%</div></div>' +
              '<div class="tf-pct-row"><div class="tf-pct-dot" style="background:#ee2222"></div><div class="tf-pct-label">Heavy</div><div class="tf-pct-num" id="tf-pct-red">' + redPct    + '%</div></div>' +
            '</div>' +
            '<div class="tf-box">' +
              '<div class="tf-box-title">Incidents</div>' +
              '<div class="tf-incident-badge">' +
                '<div class="tf-incident-count" id="tf-inc-count">' + incCount + '</div>' +
                '<div class="tf-incident-label">Active<br>Incidents</div>' +
              '</div>' +
            '</div>' +
            '<div class="tf-box tf-incidents-box">' +
              '<div class="tf-box-title">Active Reports</div>' +
              '<div class="tf-incident-list" id="tf-incident-list">' + incidentItems + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="tf-map-box">' +
            '<div class="tf-map-box-title">Road Conditions \u2014 ' + cityName + '</div>' +
            '<canvas id="tf-map-canvas"></canvas>' +
          '</div>' +
        '</div>' +
        '<div class="tf-ticker-bar">' +
          '<div class="tf-ticker-label">Traffic:</div>' +
          '<div class="tf-ticker-scroll"><span class="tf-ticker-track" id="tf-ticker">' +
            esc(tickText).repeat(3) +
          '</span></div>' +
        '</div>';

      // Draw map after layout settles
      requestAnimationFrame(function () {
        var canvas = document.getElementById('tf-map-canvas');
        if (!canvas) return;
        var parent = canvas.parentElement;
        canvas.width  = parent ? (parent.clientWidth  || 600) : 600;
        canvas.height = parent ? (parent.clientHeight || 340) : 340;
        // Subtract the title bar height
        var titleEl = parent ? parent.querySelector('.tf-map-box-title') : null;
        if (titleEl) canvas.height = Math.max(60, canvas.height - titleEl.offsetHeight);
        drawCityMap(canvas, city, greenPct, yellowPct, redPct, makeSeed(cityId, timeSlot));
      });

    } else {
      // Same city — update text elements only
      var el;
      el = document.getElementById('tf-updated-time');   if (el) el.textContent = updatedTime;
      el = document.getElementById('tf-cong-level');     if (el) { el.textContent = level; el.dataset.level = level; }
      el = document.getElementById('tf-bar-green');      if (el) el.style.width = greenPct  + '%';
      el = document.getElementById('tf-bar-yellow');     if (el) el.style.width = yellowPct + '%';
      el = document.getElementById('tf-bar-red');        if (el) el.style.width = redPct    + '%';
      el = document.getElementById('tf-pct-green');      if (el) el.textContent = greenPct  + '%';
      el = document.getElementById('tf-pct-yellow');     if (el) el.textContent = yellowPct + '%';
      el = document.getElementById('tf-pct-red');        if (el) el.textContent = redPct    + '%';
      el = document.getElementById('tf-inc-count');      if (el) el.textContent = incCount;
      el = document.getElementById('tf-incident-list');  if (el) el.innerHTML = incidentItems;
      el = document.getElementById('tf-ticker');
      if (el) { el.textContent = ''; el.appendChild(document.createTextNode(tickText.repeat(3))); }

      // Redraw map if time slot changed (traffic colours rotate)
      if (_lastTimeSlot !== timeSlot) {
        var canvas = document.getElementById('tf-map-canvas');
        if (canvas && canvas.width > 4) {
          drawCityMap(canvas, city, greenPct, yellowPct, redPct, makeSeed(cityId, timeSlot));
        }
      }
    }

    _lastCityId   = cityId;
    _lastTimeSlot = timeSlot;
  }

  // ── Polling loop ─────────────────────────────────────────────────────────
  var _refreshTimer = null;

  function load() {
    if (_refreshTimer !== null) { clearTimeout(_refreshTimer); _refreshTimer = null; }
    fetch('/api/traffic')
      .then(function (resp) {
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        return resp.json();
      })
      .then(function (data) {
        build(data);
        var ms = (data.ms_until_next > 0) ? data.ms_until_next : FALLBACK_REFRESH_MS;
        _refreshTimer = setTimeout(load, ms);
      })
      .catch(function () {
        var frame = document.getElementById('tfFrame');
        if (frame) frame.innerHTML = '<div class="tf-loading">Unable to load traffic data.</div>';
        _lastCityId = null;
        _refreshTimer = setTimeout(load, ERROR_RETRY_MS);
      });
  }

  load();
})();
</script>
</body>
</html>
