<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroIPTV Traffic</title>
  <!-- Leaflet — local vendor bundle, used as fallback when static PNGs are absent -->
  <link rel="stylesheet" href="/static/vendor/leaflet/leaflet.min.css">
  <script src="/static/vendor/leaflet/leaflet.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #0a1a6e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .tf-frame {
      width: min(1280px, 100vw);
      aspect-ratio: 16 / 9;
      background: linear-gradient(160deg, #0f2ab0 0%, #0a1a80 40%, #081060 100%);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .tf-frame::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 1000;
    }

    /* ── Header ── */
    .tf-header {
      background: linear-gradient(90deg, #0d2aaa 0%, #1640d4 50%, #0d2aaa 100%);
      border-bottom: 3px solid #4a70ff;
      padding: 0.4em 1.2em;
      display: flex;
      align-items: center;
      gap: 0.6em;
      flex-shrink: 0;
      position: relative;
      z-index: 1001;
    }
    .tf-header-title {
      font-size: clamp(20px, 3.2vw, 42px);
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #fff;
    }
    .tf-demo-badge {
      font-size: clamp(9px, 1.2vw, 14px);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: #ffd700;
      color: #0a0e2a;
      padding: 0.15em 0.5em;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .tf-city-label {
      font-size: clamp(14px, 2.2vw, 30px);
      font-weight: 900;
      letter-spacing: 0.05em;
      color: #ffd700;
      margin-left: auto;
      text-align: right;
    }
    .tf-updated-time {
      font-size: clamp(9px, 1.1vw, 14px);
      font-weight: 700;
      color: #c8d8ff;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Body grid ── */
    .tf-body {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 2.5fr;
      gap: 0.5em;
      padding: 0.4em 0.7em 0.3em;
      min-height: 0;
    }

    /* ── Left panel ── */
    .tf-left {
      display: flex;
      flex-direction: column;
      gap: 0.35em;
      min-height: 0;
    }
    .tf-box {
      background: rgba(10,40,170,0.75);
      border: 2px solid #3058d8;
      border-radius: 4px;
      padding: 0.4em 0.6em;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 2px 8px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
    }
    .tf-box-title {
      font-size: clamp(9px, 1.2vw, 15px);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffd700;
      border-bottom: 1px solid #3058d8;
      padding-bottom: 0.25em;
      margin-bottom: 0.3em;
      flex-shrink: 0;
    }
    .tf-congestion-level {
      font-size: clamp(18px, 2.8vw, 38px);
      font-weight: 900;
      text-align: center;
      margin: 0.1em 0;
      line-height: 1.1;
    }
    .tf-congestion-level[data-level="Light"]    { color: #22cc44; }
    .tf-congestion-level[data-level="Moderate"] { color: #ffaa00; }
    .tf-congestion-level[data-level="Heavy"]    { color: #ee2222; }
    .tf-congestion-sub {
      font-size: clamp(8px, 1vw, 12px);
      color: #c8d8ff;
      text-align: center;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.3em;
    }
    .tf-cong-bar {
      display: flex;
      height: clamp(8px, 1.2vw, 14px);
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid #3058d8;
      margin-bottom: 0.25em;
    }
    .tf-cong-bar-seg { height: 100%; transition: width 0.6s ease; }
    .tf-pct-row { display:flex; align-items:center; gap:0.3em; margin-bottom:0.15em; }
    .tf-pct-dot  { width:0.55em; height:0.55em; border-radius:50%; flex-shrink:0; }
    .tf-pct-label { font-size:clamp(8px,1vw,12px); color:#c8d8ff; flex:1; }
    .tf-pct-num   { font-size:clamp(8px,1vw,12px); font-weight:700; color:#ffd700; }
    .tf-incident-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4em;
      padding: 0.3em 0;
    }
    .tf-incident-count {
      font-size: clamp(28px, 4.5vw, 60px);
      font-weight: 900;
      line-height: 1;
      color: #fff;
    }
    .tf-incident-label {
      font-size: clamp(10px, 1.3vw, 16px);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #c8d8ff;
      line-height: 1.2;
    }
    .tf-incidents-box { flex:1; min-height:0; overflow:hidden; }
    .tf-incident-list { display:flex; flex-direction:column; gap:0.2em; overflow:hidden; }
    .tf-incident-item {
      display: flex;
      align-items: flex-start;
      gap: 0.35em;
      padding: 0.2em 0.3em;
      border-radius: 3px;
      background: rgba(0,10,60,0.4);
      border-left: 3px solid transparent;
    }
    .tf-incident-item[data-sev="red"]    { border-left-color: #ee2222; }
    .tf-incident-item[data-sev="yellow"] { border-left-color: #ffaa00; }
    .tf-incident-item[data-sev="green"]  { border-left-color: #22cc44; }
    .tf-incident-icon { font-size:clamp(10px,1.3vw,16px); flex-shrink:0; line-height:1.3; }
    .tf-incident-text { min-width:0; }
    .tf-incident-title {
      font-size: clamp(8px,1.1vw,13px); font-weight:700; color:#fff;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .tf-incident-road {
      font-size: clamp(7px,0.95vw,11px); color:#c8d8ff;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }

    /* ── Map box (right panel) ── */
    .tf-map-box {
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: rgba(10,40,170,0.75);
      border: 2px solid #3058d8;
      border-radius: 4px;
    }
    .tf-map-box-title {
      font-size: clamp(9px,1.2vw,15px);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffd700;
      border-bottom: 1px solid #3058d8;
      padding: 0.4em 0.6em 0.25em;
      background: rgba(10,40,170,0.85);
      flex-shrink: 0;
      position: relative;
      z-index: 2;
    }
    /* inner container holds the static-PNG layer and the Leaflet fallback */
    #tf-map-inner {
      flex: 1;
      position: relative;
      min-height: 0;
      overflow: hidden;
    }
    /* static PNG — primary; shown when basemap exists in static/maps/traffic_demo/ */
    #tf-static-map {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;   /* fill exactly so canvas pixel math aligns 1:1 */
      display: none;
      z-index: 2;
    }
    /* canvas — traffic-coloured road segments drawn over the static PNG */
    #tf-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
      z-index: 3;
      pointer-events: none;
    }
    /* Leaflet container — fallback when no static PNG is available */
    #tf-map {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    .leaflet-control-attribution { font-size: 9px !important; opacity: 0.8; }

    /* ── Ticker ── */
    .tf-ticker-bar {
      background: #0a0e2a;
      border-top: 2px solid #4a70ff;
      display: flex;
      align-items: center;
      overflow: hidden;
      flex-shrink: 0;
      height: clamp(24px, 3.6vw, 42px);
      position: relative;
      z-index: 1001;
    }
    .tf-ticker-label {
      background: #ffd700;
      color: #0a0e2a;
      font-size: clamp(9px,1.3vw,16px);
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0 0.7em;
      white-space: nowrap;
      height: 100%;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .tf-ticker-scroll { overflow:hidden; flex:1; height:100%; display:flex; align-items:center; }
    .tf-ticker-track {
      display: inline-block;
      white-space: nowrap;
      font-size: clamp(9px,1.2vw,14px);
      font-weight: 700;
      color: #ffd700;
      animation: tf-scroll 40s linear infinite;
      padding-left: 100%;
    }
    @keyframes tf-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-100%); }
    }
    .tf-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      font-size: clamp(14px, 2vw, 24px);
      color: #90a8f0;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
<div class="tf-frame" id="tfFrame">
  <div class="tf-loading" id="tfLoading">Loading traffic data&hellip;</div>
</div>

<script>
(function () {
  'use strict';

  var FALLBACK_REFRESH_MS = 2 * 60 * 1000;
  var ERROR_RETRY_MS      = 60 * 1000;

  // ── Basemap constants — must stay in sync with the tile-stitching script ──
  // Static PNGs: /static/maps/traffic_demo/<slug>.png
  // Generated at zoom BASEMAP_ZOOM, size BASEMAP_W x BASEMAP_H.
  var BASEMAP_ZOOM = 11;
  var BASEMAP_W    = 1280;
  var BASEMAP_H    = 720;

  // ── Seeded PRNG (mulberry32) ──────────────────────────────────────────────
  function mulberry32(seed) {
    return function () {
      seed |= 0;
      seed = (seed + 0x6D2B79F5) | 0;
      var t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function makeSeed(cityId, timeSlot) {
    var str = String(cityId) + ':' + String(timeSlot);
    var h = 2166136261;
    for (var i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619) >>> 0;
    }
    return h;
  }

  // ── City road layouts ─────────────────────────────────────────────────────
  var LAT_SPAN = 0.11;
  var LON_SPAN = 0.145;

  function nll(xf, yf, clat, clon) {
    return [clat + (0.5 - yf) * LAT_SPAN, clon + (xf - 0.5) * LON_SPAN];
  }

  var CITY_HWY = {
    'New York City': ['I-95','I-278','I-495','I-87','FDR Dr'],
    'Los Angeles':   ['I-5','I-10','I-405','US-101','SR-110'],
    'Chicago':       ['I-90','I-94','I-290','I-55','Lake Shore'],
    'Houston':       ['I-10','I-45','I-610','US-59','Beltway 8'],
    'Phoenix':       ['I-10','I-17','SR-51','SR-101','US-60'],
    'Philadelphia':  ['I-95','I-76','I-676','US-1','PA-309'],
    'San Antonio':   ['I-10','I-35','I-37','US-281','Loop 410'],
    'San Diego':     ['I-5','I-8','I-15','SR-94','SR-163'],
    'Dallas':        ['I-30','I-35E','I-635','US-75','SR-114'],
    'San Jose':      ['I-280','I-880','SR-87','SR-101','US-101'],
  };
  var CITY_LAYOUT = {
    'New York City':'grid',  'Los Angeles':'sprawl',
    'Chicago':'hub',         'Houston':'ring',
    'Phoenix':'sprawl',      'Philadelphia':'diagonal',
    'San Antonio':'ring',    'San Diego':'coastal',
    'Dallas':'grid',         'San Jose':'coastal',
  };

  function getRoads(city) {
    var c = city.lat, d = city.lon;
    var n = CITY_HWY[city.name] || ['I-10','I-20','I-40','US-1','State Hwy'];
    var t = CITY_LAYOUT[city.name] || 'grid';
    if (t === 'grid') return [
      {pts:[nll(0,0.38,c,d),nll(1,0.40,c,d)],w:5,label:n[0]},
      {pts:[nll(0,0.65,c,d),nll(1,0.62,c,d)],w:5,label:n[1]},
      {pts:[nll(0.30,0,c,d),nll(0.28,1,c,d)],w:5,label:n[2]},
      {pts:[nll(0.72,0,c,d),nll(0.70,1,c,d)],w:5,label:n[3]},
      {pts:[nll(0,1,c,d),nll(0.48,0,c,d)],   w:4,label:n[4]},
    ];
    if (t === 'sprawl') return [
      {pts:[nll(0.18,0,c,d),nll(0.20,1,c,d)],   w:5,label:n[0]},
      {pts:[nll(0,0.50,c,d),nll(1,0.52,c,d)],   w:5,label:n[1]},
      {pts:[nll(0.55,0,c,d),nll(0.45,1,c,d)],   w:5,label:n[2]},
      {pts:[nll(0,0.26,c,d),nll(0.62,0.56,c,d)],w:4,label:n[3]},
      {pts:[nll(0.38,1,c,d),nll(0.54,0,c,d)],   w:4,label:n[4]},
    ];
    if (t === 'hub') return [
      {pts:[nll(0,0.32,c,d),nll(0.42,0.60,c,d)],w:5,label:n[0]},
      {pts:[nll(0.38,0,c,d),nll(0.40,1,c,d)],   w:5,label:n[1]},
      {pts:[nll(0,0.56,c,d),nll(1,0.54,c,d)],   w:5,label:n[2]},
      {pts:[nll(0.60,0,c,d),nll(0.62,1,c,d)],   w:4,label:n[3]},
      {pts:[nll(0.82,0,c,d),nll(0.84,1,c,d)],   w:3,label:n[4]},
    ];
    if (t === 'ring') return [
      {pts:[nll(0,0.52,c,d),nll(1,0.49,c,d)],       w:5,label:n[0]},
      {pts:[nll(0.38,0,c,d),nll(0.40,1,c,d)],        w:5,label:n[1]},
      {pts:[nll(0,0.28,c,d),nll(0.38,0.72,c,d)],     w:4,label:n[2]},
      {pts:[nll(0.62,0.72,c,d),nll(1,0.28,c,d)],     w:4,label:n[3]},
      {pts:[nll(0,0.72,c,d),nll(0.40,1,c,d)],        w:3,label:n[4]},
    ];
    if (t === 'diagonal') return [
      {pts:[nll(0,0.22,c,d),nll(1,0.58,c,d)],       w:5,label:n[0]},
      {pts:[nll(0,0.62,c,d),nll(1,0.60,c,d)],       w:5,label:n[1]},
      {pts:[nll(0.22,0.70,c,d),nll(1,0.70,c,d)],    w:4,label:n[2]},
      {pts:[nll(0.42,0,c,d),nll(0.44,1,c,d)],       w:4,label:n[3]},
      {pts:[nll(0,1,c,d),nll(0.32,0.18,c,d)],       w:3,label:n[4]},
    ];
    return [  // coastal
      {pts:[nll(0.22,0,c,d),nll(0.20,1,c,d)],       w:5,label:n[0]},
      {pts:[nll(0,0.50,c,d),nll(1,0.52,c,d)],       w:5,label:n[1]},
      {pts:[nll(0.66,0,c,d),nll(0.68,1,c,d)],       w:5,label:n[2]},
      {pts:[nll(0,0.28,c,d),nll(0.72,0.66,c,d)],    w:4,label:n[3]},
      {pts:[nll(0.10,0,c,d),nll(0.10,1,c,d)],       w:3,label:n[4]},
    ];
  }

  // ── Web Mercator projection ───────────────────────────────────────────────
  // Converts lat/lon → canvas pixel, aligned to the pre-generated basemap PNG.
  function mercY(lat) {
    return (1 - Math.log(
      Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)
    ) / Math.PI) / 2;
  }

  function llToPx(lat, lon, clat, clon, W, H) {
    var scale = 256 * Math.pow(2, BASEMAP_ZOOM);
    var cx = (clon + 180) / 360 * scale, cy = mercY(clat) * scale;
    var px = (lon  + 180) / 360 * scale, py = mercY(lat)  * scale;
    return [
      W / 2 + (px - cx) * (W / BASEMAP_W),
      H / 2 + (py - cy) * (H / BASEMAP_H),
    ];
  }

  // ── Traffic colour helpers ────────────────────────────────────────────────
  function buildPool(g, y, r) {
    var pool = [], i;
    for (i = 0; i < g; i++) pool.push('#22ee55');
    for (i = 0; i < y; i++) pool.push('#ffcc00');
    for (i = 0; i < r; i++) pool.push('#ff3322');
    return pool.length ? pool : ['#22ee55'];
  }

  // ── Canvas overlay (used over the static PNG) ─────────────────────────────
  function drawOverlay(canvas, city, greenPct, yellowPct, redPct, seed) {
    var W = canvas.width, H = canvas.height;
    if (W < 4 || H < 4) return;
    var clat = city.lat, clon = city.lon;
    var ctx  = canvas.getContext('2d');
    ctx.clearRect(0, 0, W, H);

    var pool  = buildPool(greenPct, yellowPct, redPct);
    var rng   = mulberry32(seed);
    var roads = getRoads(city);
    ctx.lineCap = 'round';

    roads.forEach(function (rd) {
      var p0   = llToPx(rd.pts[0][0], rd.pts[0][1], clat, clon, W, H);
      var p1   = llToPx(rd.pts[1][0], rd.pts[1][1], clat, clon, W, H);
      var dx   = p1[0] - p0[0], dy = p1[1] - p0[1];
      var SEGS = 3 + Math.floor(rng() * 4);

      // White halo for contrast over the OSM basemap
      ctx.strokeStyle = 'rgba(255,255,255,0.45)';
      ctx.lineWidth   = (rd.w || 5) + 3;
      ctx.beginPath(); ctx.moveTo(p0[0], p0[1]); ctx.lineTo(p1[0], p1[1]); ctx.stroke();

      // Traffic-coloured segments
      ctx.lineWidth = rd.w || 5;
      for (var s = 0; s < SEGS; s++) {
        var t0 = s / SEGS, t1 = (s + 1) / SEGS;
        ctx.strokeStyle = pool[Math.floor(rng() * pool.length)];
        ctx.beginPath();
        ctx.moveTo(p0[0] + dx * t0, p0[1] + dy * t0);
        ctx.lineTo(p0[0] + dx * t1, p0[1] + dy * t1);
        ctx.stroke();
      }

      // Road name badge
      if (rd.label) {
        var mx = (p0[0] + p1[0]) / 2, my = (p0[1] + p1[1]) / 2;
        var fs = Math.max(9, Math.round(W * 0.014));
        ctx.font = 'bold ' + fs + 'px Arial';
        var tw = ctx.measureText(rd.label).width;
        ctx.fillStyle = 'rgba(8,18,50,0.85)';
        ctx.beginPath();
        if (ctx.roundRect) {
          ctx.roundRect(mx - tw/2 - 4, my - fs, tw + 8, fs + 5, 3);
        } else {
          ctx.rect(mx - tw/2 - 4, my - fs, tw + 8, fs + 5);
        }
        ctx.fill();
        ctx.fillStyle   = '#fff';
        ctx.textAlign   = 'center';
        ctx.fillText(rd.label, mx, my + 2);
      }
    });
  }

  // ── City slug — matches filename convention of the tile-stitching script ──
  function citySlug(name) {
    return (name || '').toLowerCase().replace(/\s+/g, '').replace(/[^a-z0-9]/g, '');
  }

  // ── Leaflet state ─────────────────────────────────────────────────────────
  var _map          = null;
  var _overlayLayer = null;

  function initLeaflet() {
    if (_map) return;
    var el = document.getElementById('tf-map');
    if (!el) return;
    _map = L.map('tf-map', {
      zoomControl: false, attributionControl: true,
      scrollWheelZoom: false, dragging: false,
      doubleClickZoom: false, touchZoom: false,
      boxZoom: false, keyboard: false,
    });
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19,
    }).addTo(_map);
  }

  function applyLeafletOverlay(city, greenPct, yellowPct, redPct, seed) {
    if (!_map) return;
    _map.setView([city.lat || 40.7128, city.lon || -74.006], 12);
    if (_overlayLayer) { _map.removeLayer(_overlayLayer); _overlayLayer = null; }
    var pool  = buildPool(greenPct, yellowPct, redPct);
    var rng   = mulberry32(seed);
    var roads = getRoads(city);
    var layers = [];
    roads.forEach(function (rd) {
      var p0 = rd.pts[0], p1 = rd.pts[1];
      var dlat = p1[0]-p0[0], dlon = p1[1]-p0[1];
      var SEGS = 3 + Math.floor(rng() * 4);
      layers.push(L.polyline([p0,p1], {color:'#fff',weight:(rd.w||5)+3,opacity:0.35}));
      for (var s = 0; s < SEGS; s++) {
        var t0=s/SEGS, t1=(s+1)/SEGS;
        layers.push(L.polyline(
          [[p0[0]+dlat*t0,p0[1]+dlon*t0],[p0[0]+dlat*t1,p0[1]+dlon*t1]],
          {color:pool[Math.floor(rng()*pool.length)],weight:rd.w||5,opacity:0.9}
        ));
      }
      if (rd.label) {
        var mid = [(p0[0]+p1[0])/2,(p0[1]+p1[1])/2];
        layers.push(L.marker(mid,{icon:L.divIcon({className:'',
          html:'<div style="background:rgba(8,18,50,.82);color:#fff;font:bold 11px Arial;'+
               'padding:1px 5px;border-radius:3px;white-space:nowrap;'+
               'box-shadow:0 1px 3px rgba(0,0,0,.5)">'+rd.label+'</div>',
          iconAnchor:[0,8]}),interactive:false}));
      }
    });
    _overlayLayer = L.layerGroup(layers).addTo(_map);
  }

  // ── PNG probe cache (per slug) ────────────────────────────────────────────
  var _pngAvail = {};

  function updateMap(city, greenPct, yellowPct, redPct, seed) {
    var slug = citySlug(city.name);
    var url  = '/static/maps/traffic_demo/' + slug + '.png';

    if (_pngAvail[slug] === true) {
      applyStaticMode(url, city, greenPct, yellowPct, redPct, seed);
      return;
    }
    if (_pngAvail[slug] === false) {
      applyLiveMode(city, greenPct, yellowPct, redPct, seed);
      return;
    }

    // Unknown — show Leaflet immediately, probe for PNG in parallel
    applyLiveMode(city, greenPct, yellowPct, redPct, seed);
    var probe = new Image();
    probe.onload = function () {
      _pngAvail[slug] = true;
      if (_lastCityId === city.id) {
        applyStaticMode(url, city, greenPct, yellowPct, redPct, seed);
      }
    };
    probe.onerror = function () { _pngAvail[slug] = false; };
    probe.src = url;
  }

  function applyStaticMode(url, city, greenPct, yellowPct, redPct, seed) {
    var imgEl = document.getElementById('tf-static-map');
    var cvEl  = document.getElementById('tf-overlay');
    var mapEl = document.getElementById('tf-map');
    if (!imgEl || !cvEl) return;
    imgEl.src = url;
    imgEl.style.display = 'block';
    cvEl.style.display  = 'block';
    if (mapEl) mapEl.style.visibility = 'hidden';
    var cont = cvEl.parentElement;
    cvEl.width  = cont ? cont.clientWidth  : BASEMAP_W;
    cvEl.height = cont ? cont.clientHeight : BASEMAP_H;
    drawOverlay(cvEl, city, greenPct, yellowPct, redPct, seed);
  }

  function applyLiveMode(city, greenPct, yellowPct, redPct, seed) {
    var imgEl = document.getElementById('tf-static-map');
    var cvEl  = document.getElementById('tf-overlay');
    var mapEl = document.getElementById('tf-map');
    if (imgEl) imgEl.style.display = 'none';
    if (cvEl)  cvEl.style.display  = 'none';
    if (mapEl) mapEl.style.visibility = 'visible';
    initLeaflet();
    applyLeafletOverlay(city, greenPct, yellowPct, redPct, seed);
  }

  // ── DOM helpers ───────────────────────────────────────────────────────────
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function buildIncidentItem(inc) {
    return '<div class="tf-incident-item" data-sev="'+esc(inc.severity)+'">'+
      '<div class="tf-incident-icon">'+(inc.icon||'\u26a0')+'</div>'+
      '<div class="tf-incident-text">'+
        '<div class="tf-incident-title">'+esc(inc.title)+'</div>'+
        '<div class="tf-incident-road">'+esc(inc.road)+' '+esc(inc.direction)+'</div>'+
      '</div></div>';
  }

  // ── Build / update ────────────────────────────────────────────────────────
  var _initialized  = false;
  var _lastCityId   = null;
  var _lastTimeSlot = null;

  function build(data) {
    var frame     = document.getElementById('tfFrame');
    var city      = data.city    || {};
    var summary   = data.summary || {};
    var incidents = Array.isArray(data.incidents) ? data.incidents : [];
    var level     = summary.congestion_level || 'Light';
    var cityId    = city.id;
    var timeSlot  = data.time_slot || 0;
    var cityName  = city.name ? (esc(city.name)+', '+esc(city.state)) : 'Traffic';
    var updatedTime = data.updated
      ? new Date(data.updated).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}) : '';
    var greenPct  = summary.green_percent  || 0;
    var yellowPct = summary.yellow_percent || 0;
    var redPct    = summary.red_percent    || 0;
    var incCount  = summary.incident_count != null ? summary.incident_count : incidents.length;
    var incidentItems = incidents.map(buildIncidentItem).join('');
    var tickParts = [
      cityName+' \u2014 '+esc(level)+' congestion',
      incCount+' reported incident'+(incCount!==1?'s':''),
      greenPct+'% free flow \u00b7 '+yellowPct+'% slow \u00b7 '+redPct+'% heavy',
    ];
    incidents.forEach(function(inc){
      tickParts.push((inc.icon||'')+' '+inc.title+' on '+inc.road+' '+inc.direction);
    });
    var tickText = tickParts.join(' \u2022 ')+' \u2022 ';

    // Build HTML skeleton ONCE — never replace frame.innerHTML after this.
    // Replacing the DOM would destroy both the Leaflet container and the
    // static-image/canvas elements, causing the blank-map-on-rotation bug.
    if (!_initialized) {
      _initialized = true;
      frame.innerHTML =
        '<div class="tf-header">'+
          '<div class="tf-header-title">\u{1F697}\u00a0RetroIPTV Traffic</div>'+
          '<div class="tf-demo-badge">(Simulated)</div>'+
          '<div class="tf-city-label" id="tf-city-label">'+cityName+'</div>'+
          '<div class="tf-updated-time" id="tf-updated-time">'+updatedTime+'</div>'+
        '</div>'+
        '<div class="tf-body">'+
          '<div class="tf-left">'+
            '<div class="tf-box">'+
              '<div class="tf-box-title">Congestion</div>'+
              '<div class="tf-congestion-level" id="tf-cong-level" data-level="'+esc(level)+'">'+esc(level)+'</div>'+
              '<div class="tf-congestion-sub">Traffic Level</div>'+
              '<div class="tf-cong-bar">'+
                '<div class="tf-cong-bar-seg" id="tf-bar-green"  style="width:'+greenPct+'%;background:#22cc44"></div>'+
                '<div class="tf-cong-bar-seg" id="tf-bar-yellow" style="width:'+yellowPct+'%;background:#ffaa00"></div>'+
                '<div class="tf-cong-bar-seg" id="tf-bar-red"    style="width:'+redPct+'%;background:#ee2222"></div>'+
              '</div>'+
              '<div class="tf-pct-row"><div class="tf-pct-dot" style="background:#22cc44"></div><div class="tf-pct-label">Free Flow</div><div class="tf-pct-num" id="tf-pct-green">'+greenPct+'%</div></div>'+
              '<div class="tf-pct-row"><div class="tf-pct-dot" style="background:#ffaa00"></div><div class="tf-pct-label">Slow</div><div class="tf-pct-num" id="tf-pct-yellow">'+yellowPct+'%</div></div>'+
              '<div class="tf-pct-row"><div class="tf-pct-dot" style="background:#ee2222"></div><div class="tf-pct-label">Heavy</div><div class="tf-pct-num" id="tf-pct-red">'+redPct+'%</div></div>'+
            '</div>'+
            '<div class="tf-box">'+
              '<div class="tf-box-title">Incidents</div>'+
              '<div class="tf-incident-badge">'+
                '<div class="tf-incident-count" id="tf-inc-count">'+incCount+'</div>'+
                '<div class="tf-incident-label">Active<br>Incidents</div>'+
              '</div>'+
            '</div>'+
            '<div class="tf-box tf-incidents-box">'+
              '<div class="tf-box-title">Active Reports</div>'+
              '<div class="tf-incident-list" id="tf-incident-list">'+incidentItems+'</div>'+
            '</div>'+
          '</div>'+
          '<div class="tf-map-box">'+
            '<div class="tf-map-box-title" id="tf-map-title">Road Conditions \u2014 '+cityName+'</div>'+
            '<div id="tf-map-inner">'+
              '<img id="tf-static-map" src="" alt="basemap">'+
              '<canvas id="tf-overlay"></canvas>'+
              '<div id="tf-map"></div>'+
            '</div>'+
          '</div>'+
        '</div>'+
        '<div class="tf-ticker-bar">'+
          '<div class="tf-ticker-label">Traffic:</div>'+
          '<div class="tf-ticker-scroll"><span class="tf-ticker-track" id="tf-ticker">'+
            esc(tickText).repeat(3)+
          '</span></div>'+
        '</div>';

      requestAnimationFrame(function () {
        updateMap(city, greenPct, yellowPct, redPct, makeSeed(cityId, timeSlot));
      });

    } else {
      // In-place updates — map elements are never touched
      var el;
      el = document.getElementById('tf-city-label');    if (el) el.textContent = city.name+', '+city.state;
      el = document.getElementById('tf-updated-time');  if (el) el.textContent = updatedTime;
      el = document.getElementById('tf-map-title');     if (el) el.textContent = 'Road Conditions \u2014 '+city.name+', '+city.state;
      el = document.getElementById('tf-cong-level');    if (el) { el.textContent=level; el.dataset.level=level; }
      el = document.getElementById('tf-bar-green');     if (el) el.style.width=greenPct+'%';
      el = document.getElementById('tf-bar-yellow');    if (el) el.style.width=yellowPct+'%';
      el = document.getElementById('tf-bar-red');       if (el) el.style.width=redPct+'%';
      el = document.getElementById('tf-pct-green');     if (el) el.textContent=greenPct+'%';
      el = document.getElementById('tf-pct-yellow');    if (el) el.textContent=yellowPct+'%';
      el = document.getElementById('tf-pct-red');       if (el) el.textContent=redPct+'%';
      el = document.getElementById('tf-inc-count');     if (el) el.textContent=incCount;
      el = document.getElementById('tf-incident-list'); if (el) el.innerHTML=incidentItems;
      el = document.getElementById('tf-ticker');
      if (el) { el.textContent=''; el.appendChild(document.createTextNode(tickText.repeat(3))); }

      if (_lastCityId !== cityId || _lastTimeSlot !== timeSlot) {
        updateMap(city, greenPct, yellowPct, redPct, makeSeed(cityId, timeSlot));
      }
    }

    _lastCityId   = cityId;
    _lastTimeSlot = timeSlot;
  }

  // ── Polling loop ──────────────────────────────────────────────────────────
  var _refreshTimer = null;

  function load() {
    if (_refreshTimer !== null) { clearTimeout(_refreshTimer); _refreshTimer = null; }
    fetch('/api/traffic')
      .then(function (resp) {
        if (!resp.ok) throw new Error('HTTP '+resp.status);
        return resp.json();
      })
      .then(function (data) {
        build(data);
        var ms = (data.ms_until_next > 0) ? data.ms_until_next : FALLBACK_REFRESH_MS;
        _refreshTimer = setTimeout(load, ms);
      })
      .catch(function () {
        var frame = document.getElementById('tfFrame');
        if (frame && !_initialized) {
          frame.innerHTML = '<div class="tf-loading">Unable to load traffic data.</div>';
        }
        _refreshTimer = setTimeout(load, ERROR_RETRY_MS);
      });
  }

  load();
})();
</script>
</body>
</html>
